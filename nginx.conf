server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: 클라이언트 라우팅 — 사전 렌더 파일($uri/index.html: /kr, /test 등)이 있으면
    # 그걸 서빙(네이버 Yeti 등 무JS 크롤러용), 없는 경로는 index.html 폴백
    location / {
        try_files $uri $uri/index.html /index.html;
    }

    # 해시 파일명 에셋은 장기 캐시
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
