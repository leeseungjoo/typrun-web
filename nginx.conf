server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: 클라이언트 라우팅 — 없는 경로는 index.html 로
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 해시 파일명 에셋은 장기 캐시
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
